<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>管理员主页</title>
	<link rel="stylesheet" href="/css/admin_home.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<header class="bg-dark text-white d-flex align-items-center justify-content-between px-4 py-2">
		<div class="d-flex align-items-center gap-3">
			<img src="/images/logo.png" alt="医院logo" width="40" height="40">
			<!-- 侧边栏切换按钮 -->
			<button class="btn btn-sm" style="background-color: transparent; border: none; color: inherit;"
				onclick="toggleSidebar()" aria-label="切换侧边栏">
				<span style="font-size: 1.2rem;">☰</span>
			</button>
			<h2 class="mb-0 fw-bold">系统后台管理</h2>
		</div>
		<div class="d-flex align-items-center gap-3">
			<a href="#" class="text-white text-decoration-none fw-semibold" th:text="${admin.username}"
				onclick="loadAdminProfile(); return false;">管理员</a>
			<a href="/logout" class="btn btn-outline-light btn-sm">退出登录</a>
		</div>
	</header>

	<div class="d-flex" style="min-height: 80vh;">
		<nav id="sidebar" class="bg-light p-3 border-end">
			<h5>管理功能</h5>
			<ul class="nav flex-column">
				<li class="nav-item"><a href="#" class="nav-link" onclick="loadContent('/admin/users')">用户管理</a></li>
				<li class="nav-item"><a href="#" class="nav-link" onclick="loadContent('/admin/departments')">科室管理</a>
				</li>
				<li class="nav-item"><a href="#" class="nav-link" onclick="loadContent('/admin/statistics')">系统统计</a>
				</li>
			</ul>
		</nav>

		<main class="flex-fill p-4" id="main-content">
			<div class="card shadow-sm">
				<div class="card-body">
					<h4 class="card-title">欢迎，<span th:text="${admin.username}">管理员</span></h4>
					<p class="card-text">请通过左侧菜单进行系统管理。</p>
				</div>
			</div>
		</main>
	</div>

	<footer class="bg-light text-center py-3 border-top">
		&copy; 2025 医院信息管理系统 | 后台管理平台
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script>
		function toggleSidebar() {
			document.getElementById("sidebar").classList.toggle("collapsed");
		}
		function loadAdminProfile() {
			$.get('/admin/profile', function (data) {
				$('#main-content').html(data);
			}).fail(() => alert("加载失败"));
		}
		function loadContent(url) {
			$.get(url, function (data) {
				$('#main-content').html(data);
			}).fail(() => alert("加载失败"));
		}
	</script>
</body>

</html>
