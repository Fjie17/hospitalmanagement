<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>医生主页</title>
	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
	<link rel="stylesheet" href="/css/doctor_home.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<header class="bg-success text-white d-flex align-items-center justify-content-between px-4 py-2">
		<div class="d-flex align-items-center gap-3">
			<img src="/images/logo.png" alt="医院logo" width="40" height="40">
			<!-- 侧边栏切换按钮 -->
			<button class="btn btn-sm" style="background-color: transparent; border: none; color: inherit;"
				onclick="toggleSidebar()" aria-label="切换侧边栏">
				<span style="font-size: 1.2rem;">☰</span>
			</button>
			<h2 class="mb-0 fw-bold">医生工作台</h2>
		</div>
		<div class="d-flex align-items-center gap-3">
			<a href="#" class="text-white text-decoration-none fw-semibold" th:text="${doctor.name}"
				onclick="loadDoctorProfile(); return false;">医生名</a>
			<a href="/logout" class="btn btn-outline-light btn-sm">退出登录</a>
		</div>
	</header>

	<div class="d-flex" style="min-height: 80vh;">
		<nav id="sidebar" class="bg-light p-3 border-end">
			<h5>医生操作</h5>
			<li class="nav-item">
				<a href="#" class="nav-link" onclick="loadContent('/doctor/schedule/page')">我的排班</a>
				<a href="#" class="nav-link" onclick="loadContent('/doctor/appointments')">我的预约</a>
			</li>
			<li class="nav-item">
				<a href="#" class="nav-link" onclick="loadContent('/doctor/records')">病历管理</a>
			</li>
		</nav>

		<main class="flex-fill p-4" id="main-content">
			<div class="card shadow-sm">
				<div class="card-body">
					<h4 class="card-title">欢迎，<span th:text="${doctor.name}">医生姓名</span></h4>
					<p class="card-text">您可以查看预约、填写病历等操作。</p>
				</div>
			</div>
		</main>
	</div>

	<footer class="bg-light text-center py-3 border-top">
		&copy; 2025 医院信息管理系统 | 医生门户
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="/js/doctor_home.js"></script>

</body>

</html>
