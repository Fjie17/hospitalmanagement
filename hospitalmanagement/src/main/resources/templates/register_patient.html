<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>病人注册</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="/css/register.css" />
</head>

<body>
	<div class="container d-flex justify-content-center align-items-center min-vh-100">
		<div class="card p-4 shadow-lg register-card w-100" style="max-width: 500px;">
			<h3 class="text-center mb-4">病人注册</h3>
			<form th:action="@{/register/patient}" method="post">
				<div class="mb-3">
					<label class="form-label">用户名</label>
					<input type="text" name="username" class="form-control" required />
				</div>
				<div class="mb-3">
					<label class="form-label">密码</label>
					<input type="password" name="password" class="form-control" required />
				</div>
				<div class="mb-3">
					<label class="form-label">姓名</label>
					<input type="text" name="name" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">性别</label>
					<select name="gender" class="form-select">
						<option value="">请选择</option>
						<option value="男">男</option>
						<option value="女">女</option>
					</select>
				</div>
				<div class="mb-3">
					<label class="form-label">电话号码</label>
					<input type="text" name="phone" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">出生日期</label>
					<input type="date" name="birthDate" class="form-control" />
				</div>
				<div class="d-grid gap-2">
					<button type="submit" class="btn btn-primary">提交注册</button>
					<a href="/login" class="btn btn-secondary">返回登录界面</a>
				</div>
			</form>
		</div>
	</div>

	<!-- 成功注册提示 Modal -->
	<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<div class="modal-header bg-success text-white">
					<h5 class="modal-title" id="successModalLabel">注册成功</h5>
				</div>
				<div class="modal-body text-center">
					病人注册成功！即将跳转到登录页面...
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/register.js"></script>
</body>

</html>
