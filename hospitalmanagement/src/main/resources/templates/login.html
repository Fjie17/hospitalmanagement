<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>医院信息管理系统 - 登录</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="/css/login.css" />
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
	<div class="bg-overlay"></div>

	<div class="container d-flex justify-content-center align-items-center min-vh-100">
		<div class="card p-4 shadow login-card">
			<h3 class="text-center mb-4 text-primary fw-bold">医院信息管理系统</h3>
			<form th:action="@{/login}" method="post">
				<div class="mb-3">
					<label for="username" class="form-label">用户名</label>
					<input type="text" id="username" name="username" class="form-control" required>
				</div>

				<div class="mb-3">
					<label for="password" class="form-label">密码</label>
					<input type="password" id="password" name="password" class="form-control" required>
				</div>

				<div class="mb-3">
					<label for="role" class="form-label">请选择</label>
					<select id="role" name="role" class="form-select" required>
						<option value="admin">管理员</option>
						<option value="doctor">医生</option>
						<option value="patient">病人</option>
					</select>
				</div>

				<div class="d-flex justify-content-between">
					<button type="submit" class="btn btn-primary w-50">登录</button>
					<button type="button" class="btn btn-outline-secondary ms-3 w-50" data-bs-toggle="modal"
						data-bs-target="#registerModal">
						注册
					</button>
				</div>
			</form>

			<div class="mt-3 text-center">
				<p th:if="${param.error}" class="text-danger">用户名或密码错误</p>
				<p th:if="${param.logout}" class="text-success">您已成功登出</p>
			</div>

			<div class="mt-3 text-center">
				<a href="/" class="btn btn-link">返回首页</a>
			</div>
		</div>
	</div>

	<!-- 注册选择 Modal -->
	<div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="registerModalLabel">选择注册类型</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
				</div>
				<div class="modal-body text-center">
					<p>请选择您的身份类型进行注册</p>
					<a href="/register/doctor" class="btn btn-outline-primary m-2">医生注册</a>
					<a href="/register/patient" class="btn btn-outline-success m-2">患者注册</a>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/login.js"></script>
</body>

</html>
