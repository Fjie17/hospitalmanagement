<div class="card shadow-sm">
	<div class="card-header bg-primary text-white">
		<h5 class="mb-0" th:text="${notice.title}">公告标题</h5>
	</div>
	<div class="card-body">
		<p class="text-muted mb-2">
			发布时间：
			<span th:text="${#temporals.format(notice.createdTime, 'yyyy-MM-dd HH:mm')}">时间</span>
		</p>
		<hr>
		<div th:utext="${notice.content}">公告内容</div>
	</div>
	<div class="card-footer text-end">
		<button class="btn btn-secondary btn-sm" onclick="loadNoticeList()">返回列表</button>
	</div>
</div>

<link rel="stylesheet" href="/css/notice.css">
