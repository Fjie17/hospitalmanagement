<div th:fragment="content">
	<div class="card-body">
		<p th:if="${#lists.isEmpty(medicalRecords)}" class="text-muted">暂无病历记录。</p>
		<ul class="list-group list-group-flush" id="medical-record-list" th:if="${#lists.size(medicalRecords) > 0}">
			<li class="list-group-item" th:each="record : ${medicalRecords}">
				<div class="d-flex justify-content-between align-items-center">
					<div>
						<strong
							th:text="'就诊日期：' + ${#temporals.format(record.recordDate, 'yyyy-MM-dd HH:mm')}"></strong><br>
						<span th:text="'诊断：' + ${record.diagnosis}"></span><br>
						<span th:text="'治疗方案：' + ${record.treatment}"></span>
					</div>
					<span class="text-muted" th:text="'医生：' + ${record.doctor.name}"></span>
				</div>
			</li>
		</ul>
	</div>
</div>
