<div class="card shadow-sm">
	<div class="card-header bg-primary text-white">
		<h4 class="mb-0">公告列表</h4>
	</div>
	<div class="card-body">
		<ul class="list-group list-group-flush">
			<li class="list-group-item d-flex justify-content-between align-items-center" th:each="n : ${notices}">
				<a href="javascript:void(0);" th:text="${n.title}"
					th:onclick="'loadNoticeDetail(' + '\'' + ${n.id} + '\'' + ')'">公告标题</a>
				<small class="text-muted" th:text="${#temporals.format(n.createdTime, 'yyyy-MM-dd HH:mm')}">时间</small>
			</li>

		</ul>
	</div>
</div>

<link rel="stylesheet" href="/css/notice.css">
